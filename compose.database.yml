services:
  postgres:
    image: postgres:17-alpine
    container_name: ontime-db
    environment:
      POSTGRES_DB: ontime
      POSTGRES_USER: ontime
      POSTGRES_PASSWORD: ontime
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ontime -d ontime"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
